<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen - DigiKitaBook</title>
    <style>
        :root {
            --bg: #08111f;
            --bg-2: #0f1c31;
            --panel: rgba(20, 33, 58, 0.88);
            --panel-soft: rgba(255, 255, 255, 0.05);
            --text: #edf4ff;
            --muted: #9cb1d1;
            --line: rgba(255, 255, 255, 0.08);
            --primary: #5fc2ff;
            --primary-2: #7af0bf;
            --accent: #ffd36b;
            --danger: #ff7f7f;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
            --radius: 22px;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(95, 194, 255, 0.18), transparent 26%),
                radial-gradient(circle at bottom left, rgba(122, 240, 191, 0.16), transparent 22%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; max-width: 100%; }
        button, input, select, textarea { font: inherit; }
        
        .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
        
        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(8, 17, 31, 0.78);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
            padding: 16px 0;
        }
        .topbar-inner { display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
        .brand-badge { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; color: #072132; background: linear-gradient(135deg, var(--primary), var(--primary-2)); font-size: 14px; }
        .nav { display: flex; gap: 10px; }
        .nav a { padding: 8px 12px; border-radius: 999px; color: var(--muted); border: 1px solid var(--line); font-size: 0.9em; }
        .nav a:hover, .nav a.active { color: var(--text); background: rgba(95, 194, 255, 0.12); border-color: rgba(95, 194, 255, 0.35); }

        /* Audiobook Player Styles */
        .player-container {
            max-width: 900px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }
        
        .book-cover-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            aspect-ratio: 2/3;
            background: var(--panel-soft);
        }
        .book-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        
        .panel { padding: 30px; border-radius: var(--radius); border: 1px solid var(--line); background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)); box-shadow: var(--shadow); }
        .muted { color: var(--muted); }
        
        .book-title { font-size: 28px; margin: 0 0 10px; line-height: 1.2; }
        .book-author { font-size: 18px; color: var(--primary); margin-bottom: 20px; display: block; }
        
        /* Controls */
        .controls-area { display: grid; gap: 20px; }
        
        select, button {
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:focus, button:focus { outline: none; border-color: var(--primary); }
        button:hover { background: rgba(255, 255, 255, 0.1); }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #072132;
            font-weight: 700;
            border: none;
        }
        .btn-primary:hover { opacity: 0.9; }

        /* Custom Range Slider */
        .progress-wrapper { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--panel-soft);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(95, 194, 255, 0.5);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        
        .time-labels { display: flex; justify-content: space-between; font-size: 0.85em; color: var(--muted); margin-top: 5px; }
        
        .player-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn-play {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #072132; font-size: 24px; cursor: pointer;
            display: grid; place-items: center;
            box-shadow: 0 10px 20px rgba(95, 194, 255, 0.3);
            transition: transform 0.2s;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play:active { transform: scale(0.95); }
        
        .btn-icon {
            background: transparent; border: 1px solid var(--line); color: var(--text);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: grid; place-items: center; font-size: 16px;
        }
        .btn-icon:hover { background: var(--panel-soft); }
        
        .settings-row { display: flex; gap: 20px; align-items: center; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        .setting-group { display: flex; align-items: center; gap: 10px; background: var(--panel-soft); padding: 8px 12px; border-radius: 12px; border: 1px solid var(--line); }
        
        .status-msg { text-align: center; padding: 10px; border-radius: 10px; margin-top: 15px; font-size: 0.9em; }
        .status-msg.info { background: rgba(95, 194, 255, 0.1); color: var(--primary); border: 1px solid rgba(95, 194, 255, 0.2); }
        .status-msg.error { background: rgba(255, 127, 127, 0.1); color: var(--danger); border: 1px solid rgba(255, 127, 127, 0.2); }
        .status-msg.success { background: rgba(122, 240, 191, 0.1); color: var(--primary-2); border: 1px solid rgba(122, 240, 191, 0.2); }

        @media (max-width: 900px) {
            .player-container { grid-template-columns: 1fr; }
            .book-cover-wrap { max-width: 250px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <!-- Topbar -->
    <div class="topbar">
        <div class="container topbar-inner">
            <div class="brand">
                <div class="brand-badge">DK</div>
                <span>DigiKitaBook</span>
            </div>
            <nav class="nav">
                <a href="index.html">Discover</a>
                <a href="#" class="active">Listen</a>
            </nav>
        </div>
    </div>

    <div class="container player-container">
        <!-- Left: Cover -->
        <div class="book-cover-wrap">
            <img id="coverImg" class="book-cover" src="" alt="Book Cover" style="display:none;">
            <div class="cover-overlay">
                <h2 id="coverTitle" style="margin:0; font-size:20px;">Select a Book</h2>
                <p id="coverAuthor" class="muted" style="margin:5px 0 0;">...</p>
            </div>
        </div>

        <!-- Right: Player -->
        <div class="panel">
            <h1 class="book-title" id="mainTitle">Select a Book to Listen</h1>
            <span class="book-author" id="mainAuthor">...</span>

            <div class="controls-area">
                <!-- Book Selector -->
                <div>
                    <label style="color:var(--muted); font-size:0.9em; margin-bottom:5px; display:block;">Available Audiobooks</label>
                    <select id="bookSelect">
                        <option value="">Loading...</option>
                    </select>
                </div>

                <!-- Voice Selector (Only for TTS) -->
                <div>
                    <label style="color:var(--muted); font-size:0.9em; margin-bottom:5px; display:block;">Voice Type</label>
                    <select id="voiceSelect">
                        <option value="">Loading voices...</option>
                    </select>
                </div>

                <!-- Main Action -->
                <button id="playBtn" class="btn-primary" onclick="handlePlay()">
                    ▶ Play Audiobook
                </button>

                <!-- Status Message -->
                <div id="statusMsg" class="status-msg info" style="display:none;"></div>

                <!-- Custom Player Controls (Hidden until loaded) -->
                <div id="playerControls" style="display:none;">
                    <div class="progress-wrapper">
                        <span id="currentTime">0:00</span>
                        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">
                        <span id="totalTime">0:00</span>
                    </div>
                    <div class="time-labels">
                        <span id="progressPercent">0%</span>
                    </div>

                    <div class="player-buttons">
                        <button class="btn-icon" onclick="skip(-10)">⏪</button>
                        <button class="btn-play" id="playPauseBtn" onclick="togglePlayPause()">⏸</button>
                        <button class="btn-icon" onclick="skip(10)">⏩</button>
                    </div>

                    <div class="settings-row">
                        <div class="setting-group">
                            <label>Speed:</label>
                            <select id="speedSelect" onchange="changeSpeed(this.value)" style="border:none; background:transparent; padding:0;">
                                <option value="0.8">0.8x</option>
                                <option value="1.0" selected>1.0x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2.0">2.0x</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>Volume:</label>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" style="width:80px;" onchange="changeVolume(this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element for Real Files -->
    <audio id="realAudio"></audio>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentBook = null;
        let isPlaying = false;
        let audioMode = 'none'; // 'real' or 'tts'
        let speechUtterance = null;
        
        const realAudioEl = document.getElementById('realAudio');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const progressPercentEl = document.getElementById('progressPercent');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const statusMsg = document.getElementById('statusMsg');
        const playerControls = document.getElementById('playerControls');

        // Load Books on Start
        window.addEventListener('DOMContentLoaded', async () => {
            await loadVoices();
            await loadBooks();
            
            // Real Audio Events
            realAudioEl.addEventListener('timeupdate', updateProgress);
            realAudioEl.addEventListener('loadedmetadata', () => {
                totalTimeEl.textContent = formatTime(realAudioEl.duration);
            });
            realAudioEl.addEventListener('ended', () => {
                isPlaying = false;
                playPauseBtn.textContent = '▶';
                progressBar.value = 0;
                currentTimeEl.textContent = '0:00';
            });
        });

        async function loadVoices() {
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '';
            
            const voices = window.speechSynthesis.getVoices();
            // Add a default option
            const defaultOpt = document.createElement('option');
            defaultOpt.value = 'default';
            defaultOpt.textContent = 'System Default';
            select.appendChild(defaultOpt);

            voices.forEach((voice, index) => {
                const opt = document.createElement('option');
                opt.value = voice.name;
                opt.textContent = `${voice.name} (${voice.lang})`;
                // Prefer English voices
                if (voice.lang.startsWith('en')) {
                    opt.selected = true;
                }
                select.appendChild(opt);
            });
        }

        async function loadBooks() {
            const select = document.getElementById('bookSelect');
            try {
                // Try to fetch from API if running
                const res = await fetch(`${API_BASE}/books?limit=50`);
                if (!res.ok) throw new Error('API not reachable');
                
                const data = await res.json();
                const books = data.items || [];
                
                // Filter only books with audiobook flag or if you want to allow TTS for all
                // Here we assume if audiobook:true, it has a file. If not, we might TTS it.
                // For this demo, let's list all books but indicate how they will be played.
                
                select.innerHTML = '<option value="">Select a book...</option>';
                
                books.forEach((book, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx; // Use index as ID for simplicity in this demo
                    opt.textContent = `${book.title} by ${book.author}`;
                    opt.dataset.id = book.id;
                    opt.dataset.title = book.title;
                    opt.dataset.author = book.author;
                    opt.dataset.desc = book.description || '';
                    opt.dataset.thumbnail = book.thumbnail || '';
                    opt.dataset.hasAudio = book.audiobook || false;
                    select.appendChild(opt);
                });
                
            } catch (err) {
                console.error('Error loading books:', err);
                select.innerHTML = '<option value="">Failed to load books (Is backend running?)</option>';
            }

            // Listen for selection
            select.addEventListener('change', (e) => {
                const idx = e.target.value;
                if (idx === "") {
                    resetPlayer();
                    return;
                }
                currentBook = {
                    id: e.target.options[idx].dataset.id,
                    title: e.target.options[idx].dataset.title,
                    author: e.target.options[idx].dataset.author,
                    desc: e.target.options[idx].dataset.desc,
                    thumbnail: e.target.options[idx].dataset.thumbnail,
                    hasAudio: e.target.options[idx].dataset.hasAudio
                };
                updateUI();
            });
        }

        function updateUI() {
            if (!currentBook) return;
            
            document.getElementById('mainTitle').textContent = currentBook.title;
            document.getElementById('mainAuthor').textContent = `by ${currentBook.author}`;
            
            const coverImg = document.getElementById('coverImg');
            const coverTitle = document.getElementById('coverTitle');
            const coverAuthor = document.getElementById('coverAuthor');
            
            if (currentBook.thumbnail) {
                coverImg.src = currentBook.thumbnail;
                coverImg.style.display = 'block';
            } else {
                coverImg.style.display = 'none';
            }
            coverTitle.textContent = currentBook.title;
            coverAuthor.textContent = currentBook.author;
            
            // Show/Hide TTS specific controls
            const voiceSelect = document.getElementById('voiceSelect');
            if (currentBook.hasAudio) {
                voiceSelect.parentElement.style.display = 'none';
                showStatus('Real Audiobook file available.', 'info');
            } else {
                voiceSelect.parentElement.style.display = 'flex';
                showStatus('No audio file found. Will use Text-to-Speech.', 'info');
            }
            
            playerControls.style.display = 'none';
            document.getElementById('playBtn').style.display = 'block';
        }

        function resetPlayer() {
            currentBook = null;
            stopAudio();
            document.getElementById('mainTitle').textContent = 'Select a Book to Listen';
            document.getElementById('mainAuthor').textContent = '...';
            document.getElementById('coverImg').style.display = 'none';
            document.getElementById('coverTitle').textContent = 'Select a Book';
            document.getElementById('coverAuthor').textContent = '...';
            document.getElementById('playBtn').style.display = 'block';
            playerControls.style.display = 'none';
            statusMsg.style.display = 'none';
        }

        async function handlePlay() {
            if (!currentBook) return;

            if (isPlaying) {
                stopAudio();
                return;
            }

            showStatus('Loading...', 'info');

            if (currentBook.hasAudio) {
                // Mode: Real Audio File
                audioMode = 'real';
                try {
                    // Assuming the API serves audio at /audio/{id} or similar
                    // Adjust URL based on your backend structure
                    const audioUrl = `${API_BASE}/audio/${currentBook.id}`; 
                    
                    realAudioEl.src = audioUrl;
                    realAudioEl.load();
                    
                    const playPromise = realAudioEl.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            isPlaying = true;
                            playPauseBtn.textContent = '⏸';
                            playerControls.style.display = 'block';
                            document.getElementById('playBtn').style.display = 'none';
                            showStatus('Playing real audio file.', 'success');
                        }).catch(e => {
                            console.error("Playback failed, falling back to TTS", e);
                            startTTS(); // Fallback
                        });
                    }
                } catch (e) {
                    console.error("Error loading audio file", e);
                    startTTS(); // Fallback if file not found
                }
            } else {
                // Mode: TTS
                startTTS();
            }
        }

        function startTTS() {
            audioMode = 'tts';
            window.speechSynthesis.cancel();
            
            if (!currentBook || !currentBook.desc) {
                showStatus('No description available for TTS.', 'error');
                return;
            }

            speechUtterance = new SpeechSynthesisUtterance(currentBook.desc);
            const voiceName = document.getElementById('voiceSelect').value;
            const voices = window.speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.name === voiceName);
            if (selectedVoice) speechUtterance.voice = selectedVoice;
            
            speechUtterance.rate = document.getElementById('speedSelect').value;
            speechUtterance.volume = document.getElementById('volumeSlider').value;

            speechUtterance.onstart = () => {
                isPlaying = true;
                playPauseBtn.textContent = '⏸';
                playerControls.style.display = 'block';
                document.getElementById('playBtn').style.display = 'none';
                showStatus('Playing via Text-to-Speech...', 'success');
            };
            
            speechUtterance.onend = () => {
                isPlaying = false;
                playPauseBtn.textContent = '▶';
                progressBar.value = 100;
                currentTimeEl.textContent = 'End';
            };

            window.speechSynthesis.speak(speechUtterance);
        }

        function togglePlayPause() {
            if (audioMode === 'real') {
                if (isPlaying) {
                    realAudioEl.pause();
                    playPauseBtn.textContent = '▶';
                } else {
                    realAudioEl.play();
                    playPauseBtn.textContent = '⏸';
                }
            } else if (audioMode === 'tts') {
                if (isPlaying) {
                    window.speechSynthesis.pause();
                    playPauseBtn.textContent = '▶';
                } else {
                    window.speechSynthesis.resume();
                    playPauseBtn.textContent = '⏸';
                }
            }
        }

        function stopAudio() {
            if (audioMode === 'real') {
                realAudioEl.pause();
                realAudioEl.currentTime = 0;
            } else if (audioMode === 'tts') {
                window.speechSynthesis.cancel();
            }
            isPlaying = false;
            playPauseBtn.textContent = '▶';
        }

        function updateProgress() {
            if (audioMode !== 'real' || !realAudioEl.duration) return;
            
            const percent = (realAudioEl.currentTime / realAudioEl.duration) * 100;
            progressBar.value = percent;
            currentTimeEl.textContent = formatTime(realAudioEl.currentTime);
            progressPercentEl.textContent = Math.round(percent) + '%';
        }

        progressBar.addEventListener('input', (e) => {
            if (audioMode === 'real' && realAudioEl.duration) {
                const time = (e.target.value / 100) * realAudioEl.duration;
                realAudioEl.currentTime = time;
                currentTimeEl.textContent = formatTime(time);
                progressPercentEl.textContent = Math.round(e.target.value) + '%';
            }
        });

        function skip(seconds) {
            if (audioMode === 'real') {
                realAudioEl.currentTime += seconds;
            } else if (audioMode === 'tts') {
                // TTS skip is complex, usually requires restarting with offset
                // For simplicity, we just warn or stop
                showStatus('Skipping not fully supported in TTS mode.', 'info');
            }
        }

        function changeSpeed(val) {
            if (audioMode === 'tts' && isPlaying) {
                // Restart TTS with new rate
                window.speechSynthesis.cancel();
                startTTS();
            }
        }

        function changeVolume(val) {
            if (audioMode === 'real') {
                realAudioEl.volume = val;
            } else if (audioMode === 'tts') {
                // TTS volume is harder to change dynamically, usually set on utterance
                // We can update the current utterance if we kept a reference
                if (speechUtterance) speechUtterance.volume = val;
            }
        }

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = `status-msg ${type}`;
            statusMsg.style.display = 'block';
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
