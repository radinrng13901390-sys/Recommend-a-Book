<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiKitab AI Assistant</title>
    <style>
        :root {
            --bg: #08111f;
            --bg-2: #0f1c31;
            --panel: rgba(14, 26, 48, 0.88);
            --panel-soft: rgba(255, 255, 255, 0.05);
            --text: #edf4ff;
            --muted: #9cb1d1;
            --line: rgba(255, 255, 255, 0.08);
            --primary: #5fc2ff;
            --primary-2: #7af0bf;
            --accent: #ffd36b;
            --danger: #ff7f7f;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
            --radius: 22px;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(95, 194, 255, 0.18), transparent 26%),
                radial-gradient(circle at bottom left, rgba(122, 240, 191, 0.16), transparent 22%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; max-width: 100%; }
        button, input, select, textarea { font: inherit; }
        textarea { resize: vertical; }
        
        .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
        .muted { color: var(--muted); }
        .no-top { margin-top: 0; }
        .top-gap { margin-top: 16px; }
        .stack-gap { display: grid; gap: 14px; }
        .align-center { align-items: center; }
        .tight { margin-bottom: 0; }
        .border-bottom { border-bottom: 1px solid var(--line); }
        
        .chat-layout {
            display: grid;
            gap: 22px;
            height: 100vh;
            padding: 20px;
        }
        
        .chat-shell { 
            max-width: 1180px; 
            margin: 0 auto; 
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-window, .mini-chat-window {
            display: grid;
            gap: 14px;
            overflow: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
        }
        .chat-window { 
            flex: 1; 
            min-height: 0; 
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(0, 0, 0, 0.2);
        }
        .mini-chat-window { min-height: 220px; max-height: 320px; border-radius: 18px; border: 1px solid var(--line); }
        
        .bubble {
            max-width: 80%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
            position: relative;
        }
        .bubble.user { 
            justify-self: end; 
            background: linear-gradient(135deg, var(--primary), #86fff6); 
            color: #072132; 
            font-weight: 600;
        }
        .bubble.bot { 
            justify-self: start; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--line); 
            color: var(--text);
        }

        .chat-input { 
            display: grid; 
            grid-template-columns: 1fr auto; 
            gap: 10px; 
            padding: 16px; 
            background: var(--panel);
            border-top: 1px solid var(--line);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
        }
        
        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }
        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(95, 194, 255, 0.2);
        }

        .btn {
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .btn-primary {
            color: #072132;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chips { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            padding: 16px; 
            overflow-x: auto;
        }
        .chip {
            padding: 10px 12px;
            border-radius: 999px;
            color: var(--muted);
            cursor: pointer;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            transition: all 0.2s;
        }
        .chip:hover {
            color: var(--text);
            background: rgba(95, 194, 255, 0.12);
            border-color: rgba(95, 194, 255, 0.35);
        }



        .message-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
        }
        .message-row.user { align-items: flex-end; }
        .message-row.bot { align-items: flex-start; }

        .typing-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            border: 1px solid var(--line);
            color: var(--muted);
        }
        .typing-dots::before, .typing-dots::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots::before { animation-delay: -0.32s; }
        .typing-dots::after { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .bubble-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .intent-badge {
            background: rgba(95, 194, 255, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
        }
        .bubble-content {
            font-size: 15px;
        }


        .chat-book-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }
        .chat-book-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .chat-book-card:hover {
            transform: translateY(-2px);
            border-color: rgba(95, 194, 255, 0.3);
        }
        .chat-book-card img, .no-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background: #000;
        }
        .no-img {
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(95, 194, 255, 0.1), rgba(122, 240, 191, 0.05));
            font-size: 24px;
        }
        .card-header {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.6);
            color: var(--primary);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .chat-book-card .card-header { position: relative; padding: 6px; font-size: 11px; background: transparent; color: var(--muted); }
        .chat-book-card img, .no-img { position: relative; }
        
        .card-title {
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-author {
            padding: 0 8px 4px;
            font-size: 11px;
            color: var(--muted);
        }
        .card-meta {
            padding: 0 8px 8px;
            font-size: 10px;
            color: var(--primary-2);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .rating, .ml-score, .audio-badge, .src-badge {
            background: rgba(255,255,255,0.1);
            padding: 1px 4px;
            border-radius: 4px;
        }
        .card-price {
            padding: 0 8px 8px;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent);
        }
        .card-link {
            display: block;
            text-align: center;
            padding: 6px;
            background: rgba(255,255,255,0.05);
            font-size: 11px;
            color: var(--primary);
            border-top: 1px solid var(--line);
        }
        .card-link:hover {
            background: rgba(95, 194, 255, 0.1);
        }


        .chat-action-panel {
            margin-top: 10px;
            padding: 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            font-size: 14px;
        }
        .panel-success {
            color: var(--primary-2);
            border-left: 3px solid var(--primary-2);
        }
        .panel-error {
            color: var(--danger);
            border-left: 3px solid var(--danger);
        }
        .panel-comments {
            display: grid;
            gap: 10px;
        }
        .comment-item {
            display: grid;
            grid-template-columns: 20px 1fr auto;
            gap: 8px;
            align-items: start;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 13px;
        }
        .sentiment { font-size: 14px; }
        .text { color: var(--text); }
        .meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
        
        .panel-reminders {
            display: grid;
            gap: 8px;
        }
        .reminder-item {
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            font-size: 13px;
        }
        .empty-state {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 10px;
        }

        @media (max-width: 760px) {
            .chat-layout { padding: 10px; }
            .chat-book-list { grid-template-columns: repeat(2, 1fr); }
            .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>


    <div class="container chat-layout">
        <div class="chat-shell card" style="border-radius: 24px; overflow: hidden; display: flex; flex-direction: column;">
            
            <div style="padding: 16px 20px; border-bottom: 1px solid var(--line); background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px;">
                <div class="brand-badge" style="width: 32px; height: 32px; border-radius: 10px; font-size: 16px;">🤖</div>
                <div>
                    <div style="font-weight: 700; font-size: 16px;">DigiKitab AI</div>
                    <div style="font-size: 12px; color: var(--muted);">Always online</div>
                </div>
            </div>

            <div id="chatMessages" class="chat-window">

            </div>


            <div id="quickReplies" class="chips">

            </div>

            <!-- Input Area -->
            <div class="chat-input">
                <input type="text" id="chatInput" class="input" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>


    <script>
        const API_BASE = 'http://localhost:8000';
        const state = {
            userId: _getUserId(),
            bookId: null, 
            history: [], 
            isTyping: false,
        };
        function _getUserId() {
            let uid = localStorage.getItem('digikitab_user_id');
            if (!uid) {
                uid = 'user_' + Math.random().toString(36).slice(2, 10);
                localStorage.setItem('digikitab_user_id', uid);
            }
            return uid;
        }

        const QUICK_REPLIES = [
            { label: 'Recommend me a book', text: 'Recommend me a book' },
            { label: 'Fantasy suggestions', text: 'Give me fantasy book suggestions' },
            { label: 'Psychology reads', text: 'I want psychology books' },
            { label: 'Motivational books', text: 'Suggest motivational books' },
            { label: 'Romance novels', text: 'Give me romance novels' },
            { label: 'Thriller picks', text: 'I like thriller books' },
            { label: 'Make an audiobook', text: 'I want to listen to a book' },
            { label: 'View book comments', text: 'Show me the comments for this book' },
            { label: 'Set a reading reminder', text: 'Set a reading reminder for me' },
            { label: 'Books like Atomic Habits', text: 'Books similar to Atomic Habits' },
            { label: 'Emotional reads', text: 'I am sad suggest something emotional' },
            { label: 'Relaxing books', text: 'I want something relaxing to read' },
        ];

        function _wrap() {
            return document.getElementById('chatMessages');
        }
        function _input() {
            return document.getElementById('chatInput');
        }
        function _send() {
            return document.getElementById('sendBtn');
        }  
        function appendMessage(content, role = 'bot', extra = null) {
            const wrap = _wrap();
            if (!wrap) return;
            const outer = document.createElement('div');
            outer.className = `message-row ${role}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            if (typeof content === 'string') {
                bubble.innerHTML = _formatText(content);
            } else {
                bubble.appendChild(content);
            }
            outer.appendChild(bubble);
            if (extra) {
                outer.appendChild(extra);
            }
            wrap.appendChild(outer);
            wrap.scrollTop = wrap.scrollHeight;
        }
        function _formatText(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const wrap = _wrap();
            if (!wrap || state.isTyping) return;
            state.isTyping = true;
            const row = document.createElement('div');
            row.className = 'message-row bot';
            row.id = 'typingIndicator';
            row.innerHTML = `<div class="typing-dots">...</div>`;
            wrap.appendChild(row);
            wrap.scrollTop = wrap.scrollHeight;
        }
        function hideTyping() {
            state.isTyping = false;
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function bookListEl(books) {
            if (!books || !books.length) return null;
            const container = document.createElement('div');
            container.className = 'chat-book-list';
            books.slice(0, 6).forEach((book, i) => {
                const card = document.createElement('div');
                card.className = 'chat-book-card';
                const rating = book.rating != null ? `<span class="rating">${Number(book.rating).toFixed(1)}</span>` : '';
                const mlScore = book.ml_score != null ? `<span class="ml-score">${(book.ml_score * 100).toFixed(0)}%</span>` : '';
                const audioBadge = book.audiobook ? `<span class="audio-badge">🎧</span>` : '';
                const srcBadge = book.source === 'gutenberg' ? `<span class="src-badge">Free</span>` : '';
                const price = book.price === 0 || book.price == null ? 'Free' : `$${Number(book.price).toFixed(2)}`;
                const thumbHtml = book.thumbnail ? `<img src="${book.thumbnail}" alt="${_esc(book.title)}">` : `<div class="no-img">📚</div>`;
                
                card.innerHTML = `
                    <div class="card-header">#${i + 1}</div>
                    ${thumbHtml}
                    <div class="card-title">${_esc(book.title)}</div>
                    <div class="card-author">${_esc(book.author)} · ${_esc(book.genre)}</div>
                    <div class="card-meta">${rating} ${mlScore} ${audioBadge} ${srcBadge}</div>
                    <div class="card-price">${price}</div>
                    ${book.url ? `<a href="${book.url}" class="card-link">View Book</a>` : ''}
                `;
                container.appendChild(card);
            });
            return container;
        }
        function _actionEl(action) {
            if (!action) return null;
            const panel = document.createElement('div');
            panel.className = 'chat-action-panel';
            if (action.type === 'audiobook') {
                const r = action.result || {};
                panel.innerHTML = r.ok ? `
                    <div class="panel-success">
                        <strong>Audiobook ready!</strong><br>
                        File: <code>${r.output_file}</code><br>
                        Chunks: ${r.chunks} · Characters: ${r.characters?.toLocaleString()}
                    </div>
                ` : `
                    <div class="panel-error">
                        ${r.error || 'Audiobook generation failed.'}
                    </div>
                `;
            } else if (action.type === 'comments') {
                const s = action.summary || {};
                const cs = action.comments || [];
                panel.innerHTML = `
                    <div class="panel-comments">
                        <strong>Comments</strong>
                        <div class="summary">Total: ${s.total ?? 0} · ${s.positive ?? 0} positive · ${s.negative ?? 0} negative · Avg: ${s.avg_rating ?? 'N/A'}</div>
                        <div class="comments-list">
                            ${cs.slice(0, 3).map(c => `
                                <div class="comment-item">
                                    <span class="sentiment">${c.sentiment === 'Positive' ? '👍' : '👎'}</span>
                                    <span class="text">${_esc(c.text)}</span>
                                    <span class="meta">${_esc(c.user_id)} · ${c.timestamp}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (action.type === 'reminders') {
                const rs = action.reminders || [];
                panel.innerHTML = `
                    <div class="panel-reminders">
                        <strong>Your Reading Reminders</strong>
                        ${rs.length ? rs.map(r => `
                            <div class="reminder-item">
                                <strong>${_esc(r.title)}</strong><br>
                                Progress: ${r.progress_pct}% ${r.eta_minutes ? `· ~${r.eta_minutes} min left` : ''} ${r.next_milestone ? `· Next alert at ${r.next_milestone}%` : '· Complete!'}
                            </div>
                        `).join('') : '<div class="empty-state">No active reminders.</div>'}
                    </div>
                `;
            }
            return panel.innerHTML ? panel : null;
        }
        function renderQuickReplies() {
            const bar = document.getElementById('quickReplies');
            if (!bar) return;
            bar.innerHTML = QUICK_REPLIES.map(qr => `
                <button class="chip" data-text="${qr.text}">${qr.label}</button>
            `).join('');
                        bar.querySelectorAll('.chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    sendMessage(btn.getAttribute('data-text'));
                });
            });
        }
        function _hideQuickReplies() {
            const bar = document.getElementById('quickReplies');
            if (bar) bar.style.display = 'none';
        }

        function _intentBadge(intent, confidence) {
            const icons = {
                recommend: '📚',
                audiobook: '🎧',
                comment: '💬',
                reminder: '⏰',
                greeting: '👋',
            };
            const icon = icons[intent] || '🤖';
            const pct = confidence != null ? `· ${(confidence * 100).toFixed(0)}%` : '';
            return `<span class="intent-badge">${icon} ${intent} ${pct}</span>`;
        }
        async function sendMessage(text) {
            const inputEl = _input();
            const message = typeof text === 'string' ? text : (inputEl?.value.trim() ?? '');
            if (!message) return;
            appendMessage(message, 'user');
            if (inputEl) inputEl.value = '';
            _hideQuickReplies();
            _setInputDisabled(true);
            showTyping();
            try {
                const res = await fetch(`${API_BASE}/chatbot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        user_id: state.userId,
                        book_id: state.bookId ?? undefined,
                    }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err?.error?.message || `Server error ${res.status}`);
                }
                const data = await res.json();
                hideTyping();
                _handleResponse(data);
            } catch (err) {
                hideTyping();
                console.error('Chatbot error:', err);
                appendMessage(`❌ ${err.message || 'Could not reach the backend. Is the FastAPI server running?'}`, 'bot');
            } finally {
                _setInputDisabled(false);
                inputEl?.focus();
            }
        }
        function _handleResponse(data) {
            const intent = data.intent || 'recommend';
            const confidence = data.confidence ?? null;
            const slots = data.slots || {};
            const message = data.message || data.answer || 'Here are some suggestions!';
            const books = data.books || data.recommendations || [];
            const action = data.action || null;
            const mlPowered = data.ml_powered ?? false;

            let replyText = message;

            if (slots.mood || slots.genre) {
                const detected = [slots.mood, slots.genre].filter(Boolean).join(' + ');
                replyText += `\n\n_Detected: ${detected}_`;
            }

            const badgeHtml = _intentBadge(intent, confidence);
            const mlText = mlPowered ? ' ML' : '';

            const bubbleNode = document.createElement('div');
            bubbleNode.innerHTML = `
                <div class="bubble-header">${badgeHtml}${mlText}</div>
                <div class="bubble-content">${_formatText(replyText)}</div>
            `;

            const bookEl = bookListEl(books);
            const actionEl = _actionEl(action);
            appendMessage(bubbleNode, 'bot', bookEl || actionEl);
            if (bookEl && actionEl) {
                appendMessage(actionEl, 'bot');
            }

            renderFollowUpChips(intent, slots);
        }

        function renderFollowUpChips(intent, slots) {
            const bar = document.getElementById('quickReplies');
            if (!bar) return;
            const followUps = {
                recommend: [
                    { label: 'Try fantasy', text: 'Give me fantasy recommendations' },
                    { label: 'Try psychology', text: 'Show me psychology books' },
                    { label: 'As audiobook', text: 'I want to listen to a book' },
                    { label: 'See comments', text: 'Show me the comments for this book' },
                ],
                audiobook: [
                    { label: 'More books', text: 'Recommend me a book' },
                    { label: 'Set reminder', text: 'Set a reading reminder for me' },
                ],
                comment: [
                    { label: 'Get suggestions', text: 'Recommend me a book' },
                    { label: 'Set reminder', text: 'Set a reading reminder' },
                ],
                reminder: [
                    { label: 'Recommendations', text: 'Recommend me a book' },
                    { label: 'View comments', text: 'Show me book comments' },
                ],
                greeting: QUICK_REPLIES.slice(0, 5),
            };
            const chips = followUps[intent] || QUICK_REPLIES.slice(0, 4);
            bar.innerHTML = chips.map(qr => `
                <button class="chip" data-text="${qr.text}">${qr.label}</button>
            `).join('');
            
            // Add click listeners
            bar.querySelectorAll('.chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    sendMessage(btn.getAttribute('data-text'));
                });
            });
            
            bar.style.display = 'flex';
        }
        function _setInputDisabled(disabled) {
            const inputEl = _input();
            const sendBtn = _send();
            if (inputEl) inputEl.disabled = disabled;
            if (sendBtn) sendBtn.disabled = disabled;
        }
        function _esc(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
        function _escAttr(str) {
            return String(str ?? '').replace(/'/g, "\'").replace(/"/g, '"');
        }
        function saveChatBook(id, title) {
            if (!id) return;
            const saved = JSON.parse(localStorage.getItem('savedBooks') || '[]');
            if (saved.some(b => b.id === id)) return;
            saved.push({ id, title, savedAt: new Date().toISOString() });
            localStorage.setItem('savedBooks', JSON.stringify(saved));

            if (event?.target) {
                event.target.classList.add('saved');
                event.target.textContent = '✓ Saved';
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {

            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('book');
            if (bookId) state.bookId = parseInt(bookId, 10);

            const sendBtn = _send();
            if (sendBtn) sendBtn.addEventListener('click', () => sendMessage());
            const inputEl = _input();
            if (inputEl) inputEl.addEventListener('keydown', handleKeyDown);
            renderQuickReplies();
            appendMessage(
                'Welcome to **DigiKitab AI** \n\n' +
                'I can help you:\n' +
                '• **Recommend** books by mood, genre, or a book you loved\n' +
                '• **Generate audiobooks** from Project Gutenberg\n' +
                '• **Show comments** and sentiment for any book\n' +
                '• **Set reading reminders** and track your progress\n\n' +
                'Type a message or tap a suggestion below',
                'bot'
            );
        });
    </script>
</body>
